<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>FaceVision</title>
<meta name="theme-color" content="#0b0c0e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FaceVision">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/static/icons/apple-touch-icon.png">
<link rel="stylesheet" href="/static/style.css?v=3">
</head>
<body>

<div id="shell">
  <nav id="navrail">
    <div id="brand">
      <svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
        <rect x="3" y="3" width="18" height="18" rx="5"/>
        <circle cx="9" cy="10" r="1.2" fill="currentColor" stroke="none"/>
        <circle cx="15" cy="10" r="1.2" fill="currentColor" stroke="none"/>
        <path d="M8.5 14.5c1 1.2 2.2 1.8 3.5 1.8s2.5-.6 3.5-1.8"/>
      </svg>
      <span class="label">FaceVision</span>
    </div>

    <a class="navlink" href="#/live" data-page="live">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M15 10l5-3v10l-5-3"/><rect x="3" y="6" width="12" height="12" rx="3"/></svg>
      <span class="label">Live</span>
    </a>
    <a class="navlink" href="#/enroll" data-page="enroll">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M12 16V4m0 0L7 9m5-5l5 5"/><path d="M4 17v2a2 2 0 002 2h12a2 2 0 002-2v-2"/></svg>
      <span class="label">Enroll</span>
    </a>
    <a class="navlink" href="#/identify" data-page="identify">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><rect x="3" y="5" width="18" height="14" rx="3"/><circle cx="9" cy="11" r="2.2"/><path d="M5.5 17c.8-1.8 2-2.6 3.5-2.6s2.7.8 3.5 2.6"/><path d="M15 9h4M15 13h4"/></svg>
      <span class="label">Identify</span>
    </a>
    <a class="navlink" href="#/search" data-page="search">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
      <span class="label">Search</span>
    </a>
    <a class="navlink" href="#/people" data-page="people">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="9" cy="8" r="3.2"/><path d="M3.5 19c.9-3 3-4.5 5.5-4.5s4.6 1.5 5.5 4.5"/><circle cx="16.5" cy="9.5" r="2.5"/><path d="M16 14.6c2 .3 3.6 1.6 4.4 3.9"/></svg>
      <span class="label">People</span>
    </a>
    <a class="navlink" href="#/gallery" data-page="gallery">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><rect x="3" y="5" width="18" height="14" rx="3"/><circle cx="9" cy="10" r="1.6"/><path d="M3.5 17l5-5 4 4 3.5-3.5 4.5 4.5"/></svg>
      <span class="label">Gallery</span>
    </a>
    <a class="navlink" href="#/objects" data-page="objects">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M12 3l8 4.5v9L12 21l-8-4.5v-9L12 3z"/><path d="M12 12l8-4.5M12 12v9M12 12L4 7.5"/></svg>
      <span class="label">Objects</span>
    </a>

    <a class="navlink" href="#/audit" data-page="audit" data-min-role="operator" style="display:none">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M4 4h16v16H4z" opacity="0"/><path d="M8 6h9M8 10h9M8 14h6"/><path d="M4 6h.01M4 10h.01M4 14h.01"/></svg>
      <span class="label">Audit</span>
    </a>
    <a class="navlink" href="#/users" data-page="users" data-min-role="admin" style="display:none">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="12" cy="8" r="3.2"/><path d="M5.5 20c.9-3.5 3.4-5.2 6.5-5.2s5.6 1.7 6.5 5.2"/></svg>
      <span class="label">Users</span>
    </a>

    <div class="spacer"></div>

    <div id="navStatus">
      <span id="statusDot"></span>
      <span class="label" id="statusText">connecting…</span>
    </div>
    <div id="navUserRow">
      <span class="label" id="navUser"></span>
      <button id="signOutBtn" title="Sign out">⎋</button>
    </div>

    <a class="navlink" href="#/settings" data-page="settings">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 00.34 1.87l.06.06a2 2 0 11-2.83 2.83l-.06-.06a1.7 1.7 0 00-1.87-.34 1.7 1.7 0 00-1 1.55V21a2 2 0 11-4 0v-.09a1.7 1.7 0 00-1-1.55 1.7 1.7 0 00-1.87.34l-.06.06a2 2 0 11-2.83-2.83l.06-.06a1.7 1.7 0 00.34-1.87 1.7 1.7 0 00-1.55-1H3a2 2 0 110-4h.09a1.7 1.7 0 001.55-1 1.7 1.7 0 00-.34-1.87l-.06-.06a2 2 0 112.83-2.83l.06.06a1.7 1.7 0 001.87.34h0a1.7 1.7 0 001-1.55V3a2 2 0 114 0v.09a1.7 1.7 0 001 1.55h0a1.7 1.7 0 001.87-.34l.06-.06a2 2 0 112.83 2.83l-.06.06a1.7 1.7 0 00-.34 1.87v0a1.7 1.7 0 001.55 1H21a2 2 0 110 4h-.09a1.7 1.7 0 00-1.55 1z"/></svg>
      <span class="label">Settings</span>
    </a>
  </nav>

  <main id="page"></main>
</div>

<div id="toasts"></div>
<div id="modalRoot"></div>

<script type="module" src="/static/app.js?v=3"></script>
</body>
</html>
