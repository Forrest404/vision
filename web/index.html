<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Precise Segmentation</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>

<main>
  <section id="feed">
    <img id="video" src="/video_feed" alt="Live segmentation stream">
  </section>

  <aside id="panel">

    <div id="statusRow">
      <span id="liveBadge"><span id="liveDot"></span>LIVE</span>
      <span id="modelName">yolo11s-seg</span>
      <span id="fpsLabel">0 FPS</span>
    </div>

    <section class="group">
      <h2>Segmentation mode</h2>
      <button id="modeBtn" class="wide">YOLO Seg</button>
    </section>

    <section class="group" id="sizeGroup">
      <h2>Model size</h2>
      <div id="sizeRow">
        <button data-size="n">Nano</button>
        <button data-size="s" class="active">Small</button>
        <button data-size="m">Medium</button>
      </div>
    </section>

    <section class="group">
      <h2>Confidence <output id="confOut">0.35</output></h2>
      <input type="range" id="confSlider" min="0.1" max="0.95" step="0.05" value="0.35">
    </section>

    <section class="group">
      <button id="boxesBtn" class="wide">Bounding Boxes: Off</button>
    </section>

    <section class="group" id="classGroup">
      <h2>Class filter <span class="hint">(none active = all)</span></h2>
      <div id="classGrid"></div>
    </section>

    <section class="group" id="objectsGroup">
      <h2>Objects detected</h2>
      <div id="objectsCount">0</div>
    </section>

    <button id="snapBtn" class="wide primary">Snapshot</button>

    <p id="shortcuts">M mode &nbsp;·&nbsp; 1/2/3 size &nbsp;·&nbsp; [ ] confidence &nbsp;·&nbsp; B boxes</p>

  </aside>
</main>

<canvas id="snapCanvas" hidden></canvas>
<script src="/static/app.js"></script>
</body>
</html>
